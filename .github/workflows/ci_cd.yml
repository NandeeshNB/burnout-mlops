name: MLOps CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pandas scikit-learn xgboost mlflow fastapi uvicorn python-multipart pytest httpx

      - name: Generate dataset
        run: python generate_data.py

      - name: Run preprocessing
        run: python src/preprocess.py

      - name: Train model
        run: |
          export MLFLOW_TRACKING_URI="file:///tmp/mlruns"
          python src/train.py

      - name: Run tests
        run: pytest tests/ -v

      - name: Validate model metrics
        run: |
          python -c "
          import json
          with open('reports/metrics.json') as f:
              m = json.load(f)
          print('Metrics:', m)
          assert m['f1_score'] >= 0.50, f'F1 below threshold: {m[\"f1_score\"]}'
          print('Model validation passed!')
          "