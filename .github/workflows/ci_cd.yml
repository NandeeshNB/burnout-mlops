name: MLOps CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

  train-and-validate:
    name: Train Model
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull DVC data
        run: |
          dvc remote modify localremote url /tmp/dvc-remote
          dvc pull

      - name: Run DVC pipeline
        run: dvc repro

      - name: Validate model metrics
        run: |
          python -c "
          import json
          with open('reports/metrics.json') as f:
              m = json.load(f)
          assert m['f1_score'] >= 0.70, f'F1 below threshold: {m[\"f1_score\"]}'
          assert m['roc_auc']  >= 0.75, f'AUC below threshold: {m[\"roc_auc\"]}'
          print('Model validation passed:', m)
          "

  build-and-push:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: train-and-validate
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t burnout-mlops:${{ github.sha }} .

      - name: Smoke test the API
        run: |
          docker run -d -p 8000:8000 --name api burnout-mlops:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8000/health
          docker stop api

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push image
        run: |
          docker tag burnout-mlops:${{ github.sha }} \
            ${{ secrets.DOCKER_USERNAME }}/burnout-mlops:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/burnout-mlops:latest